org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false

# Matikan incremental compilation Kotlin — menghindari bug cache yang bikin daemon crash
kotlin.incremental=false
kotlin.incremental.useClasspathSnapshot=false

# Hindari Kotlin daemon terpisah yang sering jadi sumber crash di Windows
kotlin.compiler.execution.strategy=in-process